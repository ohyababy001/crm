// 一鍵更新匯率、金價，並把所有黃金帳戶的單價同步到最新國際金價
function manualRefreshMarket() {
    toast('更新中...');
    var fxDone = false, goldDone = false, fxOk = false, goldOk = false;
    function finish() {
        if (!fxDone || !goldDone) return;
        // 更新黃金帳戶
        var price = (DATA.assets.goldRef && DATA.assets.goldRef.twdPerTael) || 0;
        var updatedGold = 0;
        if (price) {
            ['liquid','invest','fixed','receivable','debt'].forEach(function(k){
                (DATA.assets[k] || []).forEach(function(a){
                    if (a.isGold && a.goldTael) {
                        a.goldUnitPrice = price;
                        a.amount = Math.round(a.goldTael * price);
                        a.updatedAt = _todayStr();
                        updatedGold++;
                    }
                });
            });
        }
        saveData();
        maybeAutoSnapshot();
        renderAssets();
        // 提示訊息：依成功狀況組合
        var parts = [];
        if (fxOk) parts.push('匯率已更新');
        if (goldOk) parts.push('金價 ' + fmt(price) + '/兩');
        if (updatedGold > 0) parts.push('同步 ' + updatedGold + ' 筆黃金');
        if (parts.length === 0) toast('更新失敗，請稍後再試', true);
        else toast(parts.join('·'));
    }
    fetchFxRates(function(ok){ fxDone = true; fxOk = ok; finish(); });
    fetchGoldPrice(function(ok){ goldDone = true; goldOk = ok; finish(); });
}

// ── 折線圖 ──
var _nwTrendMonths = 6; // 預設顯示近 6 個月
function renderAssetTrendChart(rangeMonths) {
    if (rangeMonths !== undefined) _nwTrendMonths = rangeMonths;
    // 更新按鈕 active 狀態
    document.querySelectorAll('.nw-range-btn').forEach(function(b){
        var text = b.textContent.trim();
        if (text === '自訂') {
            b.classList.toggle('active', _nwTrendMonths === -1);
        } else {
            var m = text.match(/\d+/);
            var val = m ? parseInt(m[0]) : 0;
            b.classList.toggle('active', val === _nwTrendMonths);
        }
    });
    var canvas = document.getElementById('nw-trend-chart');
    if (!canvas || typeof Chart === 'undefined') return;
    var hist = (DATA.assets.history || []).slice().sort(function(a,b){ return a.date < b.date ? -1 : 1; });

    // 依範圍決定聚合粒度：近 6 月→日、近 12 月→週、近 24 月/全部→月
    var granularity = 'month';
    if (_nwTrendMonths === 6) granularity = 'day';
    else if (_nwTrendMonths === 12) granularity = 'week';

    // ISO 週鍵 YYYY-Www（用週一當基準）
    function _weekKey(dateStr) {
        var d = new Date(dateStr);
        var day = (d.getDay() + 6) % 7; // 週一=0
        d.setDate(d.getDate() - day);
        var y = d.getFullYear();
        var m = String(d.getMonth()+1).padStart(2,'0');
        var dd = String(d.getDate()).padStart(2,'0');
        return y + '-' + m + '-' + dd; // 週一的日期當標籤
    }

    var bucket = {};
    hist.forEach(function(h) {
        var k;
        if (granularity === 'day') k = h.date;
        else if (granularity === 'week') k = _weekKey(h.date);
        else k = h.date.slice(0,7);
        bucket[k] = h; // 後蓋前 = 該桶最後一筆
    });
    var keys = Object.keys(bucket).sort();

    if (_nwTrendMonths === -1 && _nwTrendCustomStart && _nwTrendCustomEnd) {
        // 自訂範圍：維持月聚合（上面 granularity 預設 month）
        keys = keys.filter(function(k){ return k >= _nwTrendCustomStart && k <= _nwTrendCustomEnd; });
    } else if (_nwTrendMonths > 0) {
        // 用日期範圍過濾而非直接 slice，確保日/週聚合也只顯示 N 個月內
        var cutoff = new Date();
        cutoff.setMonth(cutoff.getMonth() - _nwTrendMonths);
        var cutoffStr = cutoff.getFullYear() + '-' +
            String(cutoff.getMonth()+1).padStart(2,'0') + '-' +
            String(cutoff.getDate()).padStart(2,'0');
        keys = keys.filter(function(k){
            var ref = (granularity === 'month') ? k + '-01' : k;
            return ref >= cutoffStr;
        });
    }
    var labels = keys;
    var values = keys.map(function(k){ return bucket[k].netWorth; });

    // 統計列
    var statsEl = document.getElementById('nw-trend-stats');
    if (statsEl && values.length > 0) {
        var curNW = values[values.length - 1];
        var now = new Date();
        // 給「月/季/年」比較用：不受顯示粒度影響，一律按月最後一筆
        var _byMonthForStats = {};
        hist.forEach(function(h) { _byMonthForStats[h.date.slice(0,7)] = h; });

        // 輔助函式：找 N 個月前的淨資產
        function _getNwMonthsAgo(n) {
            var d = new Date(now.getFullYear(), now.getMonth() - n, 1);
            var ym = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
            return _byMonthForStats[ym] ? _byMonthForStats[ym].netWorth : null;
        }
        function _fmtChange(prev) {
            if (prev === null) return '<span style="color:var(--muted)">—</span>';
            var diff = curNW - prev;
            var pct = prev !== 0 ? (diff / Math.abs(prev)) * 100 : 0;
            var isPos = diff >= 0;
            var color = isPos ? 'var(--green)' : 'var(--red)';
            var arrow = isPos ? '▲' : '▼';
            var sign = isPos ? '+' : '';
            var pctStr = prev !== 0 ? ' (' + sign + pct.toFixed(1) + '%)' : '';
            return '<span style="color:' + color + ';font-weight:700">' + arrow + ' ' + sign + fmt(diff) + pctStr + '</span>';
        }

        // 時間維度變化
        var sh = '<div class="nw-stats-row">';
        sh += '<span class="nw-stats-item">月 ' + _fmtChange(_getNwMonthsAgo(1)) + '</span>';
        sh += '<span class="nw-stats-item">季 ' + _fmtChange(_getNwMonthsAgo(3)) + '</span>';
        sh += '<span class="nw-stats-item">年 ' + _fmtChange(_getNwMonthsAgo(12)) + '</span>';
        sh += '</div>';

        // 最高 / 最低 / 平均
        var maxVal = -Infinity, minVal = Infinity, sum = 0, maxMonth = '', minMonth = '';
        for (var vi = 0; vi < values.length; vi++) {
            sum += values[vi];
            if (values[vi] > maxVal) { maxVal = values[vi]; maxMonth = labels[vi]; }
            if (values[vi] < minVal) { minVal = values[vi]; minMonth = labels[vi]; }
        }
        var avgVal = Math.round(sum / values.length);
        sh += '<div class="nw-stats-row">';
        sh += '<span class="nw-stats-item">最高 <b>' + fmt(maxVal) + '</b> <small>' + _toROCDate(maxMonth) + '</small></span>';
        sh += '<span class="nw-stats-item">最低 <b>' + fmt(minVal) + '</b> <small>' + _toROCDate(minMonth) + '</small></span>';
        sh += '<span class="nw-stats-item">平均 <b>' + fmt(avgVal) + '</b></span>';
        sh += '</div>';
        statsEl.innerHTML = sh;
    } else if (statsEl) {
        statsEl.innerHTML = '';
    }

    if (_assetTrendChart) { try { _assetTrendChart.destroy(); } catch(e){} }
    if (labels.length === 0) {
        var ctx0 = canvas.getContext('2d');
        ctx0.clearRect(0,0,canvas.width,canvas.height);
        ctx0.fillStyle = '#8C8578';
        ctx0.font = '13px sans-serif';
        ctx0.textAlign = 'center';
        ctx0.fillText('尚無歷史快照，明天回來就會有第一筆資料', canvas.width/2, 40);
        return;
    }
    _assetTrendChart = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
            labels: labels.map(_toROCDate),
            datasets: [{
                label: '淨資產',
                data: values,
                borderColor: '#059669',
                backgroundColor: 'rgba(5,150,105,.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 4,
                pointBackgroundColor: '#059669'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: function(ctx){ return fmt(ctx.parsed.y); } } }
            },
            scales: {
                y: { ticks: { callback: function(v){ return fmt(v); } } }
            }
        }
    });
}

// ── CRUD modal ──
function _assetModal(title, acc, onOk, onDel) {
    var existing = document.getElementById('asset-modal-overlay');
    if (existing) existing.remove();
    var overlay = document.createElement('div');
    overlay.id = 'asset-modal-overlay';
    overlay.className = 'asset-modal-overlay';
    var html = '';
    var goldRef = (DATA.assets.goldRef && DATA.assets.goldRef.twdPerTael) || 0;
    html += '<div class="asset-modal" onclick="event.stopPropagation()">';
    html += '<h3>' + esc(title) + '</h3>';
    html += '<div class="fld"><label>名稱</label><input id="am-name" type="text" value="' + esc(acc.name || '') + '"></div>';
    html += '<div class="fld"><label><input id="am-gold" type="checkbox"' + (acc.isGold ? ' checked' : '') + '> 這是黃金（按台兩記錄）</label></div>';
    // 一般欄位（非黃金）
    html += '<div id="am-normal-fields">';
    html += '<div class="row2">';
    html += '<div class="fld"><label>幣別</label><select id="am-cur"><option value="TWD">TWD</option><option value="USD">USD</option><option value="JPY">JPY</option><option value="KRW">KRW</option></select></div>';
    html += '<div class="fld"><label>金額</label><input id="am-amt" type="number" step="any" value="' + (!acc.isGold && acc.amount != null ? acc.amount : '') + '"></div>';
    html += '</div>';
    html += '<div class="fld" id="am-rate-row" style="display:none"><label>匯率（1 外幣 = ? TWD）</label><input id="am-rate" type="number" step="any" value="' + (acc.rate != null ? acc.rate : '') + '"></div>';
    html += '</div>';
    // 黃金欄位
    html += '<div id="am-gold-fields" style="display:none">';
    html += '<div class="row2">';
    html += '<div class="fld"><label>持有（台兩）</label><input id="am-gold-tael" type="number" step="any" value="' + (acc.goldTael != null ? acc.goldTael : '') + '"></div>';
    html += '<div class="fld"><label>單價（TWD/兩）</label><input id="am-gold-price" type="number" step="any" value="' + (acc.goldUnitPrice != null ? acc.goldUnitPrice : (goldRef || '')) + '"></div>';
    html += '</div>';
    html += '<div class="fld"><label>換算總價</label><input id="am-gold-total" type="text" value="" readonly style="background:#FAFAF9;color:var(--lux-navy);font-weight:800"></div>';
    if (goldRef) html += '<div style="font-size:11px;color:var(--muted);margin-top:-6px;margin-bottom:12px">參考國際金價：' + fmt(goldRef) + ' /兩</div>';
    html += '</div>';
    html += '<div class="fld"><label>備註（選填）</label><input id="am-memo" type="text" value="' + esc(acc.memo || '') + '"></div>';
    html += '<div class="btns">';
    if (onDel) html += '<button class="btn-del" id="am-del">刪除</button>';
    html += '<button class="btn-cancel" id="am-cancel">取消</button>';
    html += '<button class="btn-ok" id="am-ok">儲存</button>';
    html += '</div>';
    html += '</div>';
    overlay.innerHTML = html;
    overlay.addEventListener('click', function(e){ if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
    var curSel = document.getElementById('am-cur');
    curSel.value = acc.currency || 'TWD';
    var rateRow = document.getElementById('am-rate-row');
    var goldCheck = document.getElementById('am-gold');
    var normalFields = document.getElementById('am-normal-fields');
    var goldFields = document.getElementById('am-gold-fields');
    var goldTaelIn = document.getElementById('am-gold-tael');
    var goldPriceIn = document.getElementById('am-gold-price');
    var goldTotalIn = document.getElementById('am-gold-total');
    function updateRateRow() {
        if (curSel.value === 'TWD') rateRow.style.display = 'none';
        else {
            rateRow.style.display = '';
            var rIn = document.getElementById('am-rate');
            if (!rIn.value) rIn.value = getFxRate(curSel.value);
        }
    }
    function updateGoldTotal() {
        var t = Number(goldTaelIn.value) || 0;
        var p = Number(goldPriceIn.value) || 0;
        goldTotalIn.value = Math.round(t * p).toLocaleString();
    }
    function updateGoldMode() {
        if (goldCheck.checked) {
            normalFields.style.display = 'none';
            goldFields.style.display = '';
            updateGoldTotal();
        } else {
            normalFields.style.display = '';
            goldFields.style.display = 'none';
        }
    }
    curSel.addEventListener('change', updateRateRow);
    goldCheck.addEventListener('change', updateGoldMode);
    goldTaelIn.addEventListener('input', updateGoldTotal);
    goldPriceIn.addEventListener('input', updateGoldTotal);
    updateRateRow();
    updateGoldMode();
    document.getElementById('am-cancel').onclick = function(){ overlay.remove(); };
    document.getElementById('am-ok').onclick = function(){
        var name = document.getElementById('am-name').value.trim();
        var memo = document.getElementById('am-memo').value.trim();
        var isGold = goldCheck.checked;
        if (!name) { toast('請輸入名稱', true); return; }
        var result;
        if (isGold) {
            var tael = Number(goldTaelIn.value);
            var unitPrice = Number(goldPriceIn.value);
            if (isNaN(tael) || tael <= 0) { toast('請輸入台兩數', true); return; }
            if (isNaN(unitPrice) || unitPrice <= 0) { toast('請輸入單價', true); return; }
            result = {
                id: acc.id || _assetUid(),
                name: name,
                amount: Math.round(tael * unitPrice),
                currency: 'TWD',
                rate: 1,
                memo: memo,
                isGold: true,
                goldTael: tael,
                goldUnitPrice: unitPrice,
                updatedAt: _todayStr()
            };
        } else {
            var amt = Number(document.getElementById('am-amt').value);
            var cur = curSel.value;
            var rate = Number(document.getElementById('am-rate').value);
            if (isNaN(amt)) { toast('請輸入數字金額', true); return; }
            result = {
                id: acc.id || _assetUid(),
                name: name,
                amount: amt,
                currency: cur,
                rate: cur === 'TWD' ? 1 : (rate > 0 ? rate : getFxRate(cur)),
                memo: memo,
                isGold: false,
                updatedAt: _todayStr()
            };
        }
        onOk(result);
        overlay.remove();
    };
    if (onDel) {
        document.getElementById('am-del').onclick = function(){
            var curName = document.getElementById('am-name').value.trim() || acc.name || '此項目';
            confirmAction('確定刪除「' + esc(curName) + '」？', function(){
                onDel();
                overlay.remove();
            }, { danger: true });
        };
    }
    setTimeout(function(){ document.getElementById('am-name').focus(); }, 50);
}

function addAssetAccount(sectionKey) {
    var sec = ASSET_SECTIONS.find(function(s){ return s.key === sectionKey; });
    _assetModal('新增' + sec.label + '項目', { currency: 'TWD' }, function(acc){
        DATA.assets[sectionKey].push(acc);
        saveData();
        maybeAutoSnapshot();
        renderAssets();
    });
}

function moveAssetAccount(sectionKey, id, delta) {
    var list = DATA.assets[sectionKey] || [];
    var idx = -1;
    for (var i=0;i<list.length;i++) if (list[i].id === id) { idx = i; break; }
    if (idx < 0) return;
    var newIdx = idx + delta;
    if (newIdx < 0 || newIdx >= list.length) return;
    var tmp = list[idx];
    list[idx] = list[newIdx];
    list[newIdx] = tmp;
    saveData();
    renderAssets();
}

function editAssetAccount(sectionKey, id) {
    var list = DATA.assets[sectionKey] || [];
    var idx = -1;
    for (var i=0;i<list.length;i++) if (list[i].id === id) { idx = i; break; }
    if (idx < 0) return;
    var sec = ASSET_SECTIONS.find(function(s){ return s.key === sectionKey; });
    var cur = list[idx];
    var name = cur.name;
    _assetModal('編輯' + sec.label + '項目', cur, function(acc){
        DATA.assets[sectionKey][idx] = acc;
        saveData();
        maybeAutoSnapshot();
        renderAssets();
    }, function(){
        DATA.assets[sectionKey].splice(idx, 1);
        saveData();
        maybeAutoSnapshot();
        renderAssets();
        toast('已刪除「' + name + '」');
    });
}

// ── 初始化 ──
loadData();
loadStockData();
updateLastExportLabel();
// 一次性：放款→借款
(function(){
    var changed = false;
    DATA.settings.passiveSources.forEach(function(s,i){
        var n = typeof s === 'string' ? s : s.name;
        if (n === '放款') {
            if (typeof s === 'string') DATA.settings.passiveSources[i] = '借款';
            else s.name = '借款';
            changed = true;
        }
    });
    if (changed) {
        DATA.settings.years.forEach(function(y){
            if (DATA.passive[y] && DATA.passive[y]['放款']) {
                DATA.passive[y]['借款'] = DATA.passive[y]['放款'];
                delete DATA.passive[y]['放款'];
            }
        });
        saveData();
    }
})();
render();
// 啟動時：自動快照 + 背景抓匯率/金價（不擋畫面）
try { maybeAutoSnapshot(); } catch(e) { console.error('[maybeAutoSnapshot init]', e); }
setTimeout(function(){
    try { maybeAutoFetchFx(); } catch(e) { console.error('[maybeAutoFetchFx init]', e); }
    try { maybeAutoFetchGold(); } catch(e) { console.error('[maybeAutoFetchGold init]', e); }
}, 500);
// 定期收入循環：畫面先出來，再跳補記 modal（等 DOM 準備好）
_whenReady(function(){
    try { runRecurringAutoPost(); } catch(e) { console.error('[runRecurringAutoPost]', e); }
});
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
