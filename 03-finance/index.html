        '<div class="modal-btns" style="margin-top:10px"><button onclick="this.closest(\'.overlay\').remove()" style="flex:1">取消</button></div>' +
        '</div>';
    ov.innerHTML = html;
    document.body.appendChild(ov);
    ov.querySelectorAll('.restore-opt').forEach(function(btn) {
        btn.onmouseenter = function() { btn.style.background = '#F1EDE8'; btn.style.borderColor = 'var(--lux-navy)'; };
        btn.onmouseleave = function() { btn.style.background = 'var(--card)'; btn.style.borderColor = 'var(--border)'; };
        btn.onclick = function() {
            var idx = parseInt(btn.dataset.idx, 10);
            var chosen = options[idx];
            ov.remove();
            showConfirm2('確定還原為：\n' + chosen.label + '\n\n目前的台股資料會被覆蓋（但會先推進一份快照保留）。', function onYes() {
                try {
                    var curRaw = localStorage.getItem(STOCK_KEY);
                    if (curRaw) pushSnapshot(curRaw);
                } catch(_) {}
                try {
                    var restored = JSON.parse(chosen.raw);
                    stockData = restored;
                    if (!stockData.holdings) stockData.holdings = [];
                    if (!stockData.dividends) stockData.dividends = [];
                    if (!stockData.pledges) stockData.pledges = [];
                    if (!stockData.prices) stockData.prices = {};
                    delete stockData._loadFailed;
                    saveStockData();
                    render();
                    toast('已還原台股資料：股利 ' + stockData.dividends.length + ' 筆');
                } catch(err) {
                    showAlert('還原失敗：' + err.message, '<i class="ti ti-alert-circle"></i> 還原失敗');
                }
            }, null, { title: '確認還原', okText: '確定還原', okStyle: 'background:var(--red)' });
        };
    });
}

function saveStockData() {
    // ★ 安全門：若載入時失敗，絕對不能寫回，避免把損壞/空資料覆蓋原始 localStorage
    if (stockData && stockData._loadFailed) {
        console.warn('[saveStockData] 已阻擋：載入失敗狀態下禁止寫入 localStorage');
        toast('已阻擋寫入：資料載入失敗，請先救援', true);
        return;
    }
    try {
        var json = JSON.stringify(stockData);
        localStorage.setItem(STOCK_KEY, json);
        // 同步更新筆數基準，讓「大幅減少警告」有依據
        try { localStorage.setItem(STOCK_LAST_COUNT_KEY, String(stockData.dividends.length)); } catch(_e) {}
        console.log('[saveStockData] 已存 dividends:', stockData.dividends.length, '筆，時間:', new Date().toLocaleTimeString());
    } catch(e) {
        console.error('[saveStockData] 失敗:', e);
        if (e && e.name === 'QuotaExceededError') {
            toast('儲存失敗：瀏覽器儲存空間已滿', true);
        } else {
            toast('儲存失敗：' + (e.message || '未知錯誤'), true);
        }
    }
}

// ── TWSE API（直接呼叫，有 CORS 支援）──
// 快取所有上市股票當日資料（代號→{name, price}）
var _twseAllCache = null;
var _twseAllCacheTime = 0;

function fetchTWSEAll(callback) {
    // 快取 3 分鐘
    if (_twseAllCache && (Date.now() - _twseAllCacheTime < 3 * 60 * 1000)) {
        callback(null, _twseAllCache);
        return;
    }
    fetch('https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=json')
        .then(function(r) { return r.json(); })
        .then(function(json) {
            if (json.stat === 'OK' && json.data) {
                var map = {};
                json.data.forEach(function(row) {
                    // [代號, 名稱, 成交股數, 成交金額, 開盤價, 最高價, 最低價, 收盤價, 漲跌價差, 成交筆數]
                    var id = row[0].trim();
                    var name = row[1].trim();
                    var price = parseFloat(row[7].replace(/,/g, ''));
                    var change = parseFloat(row[8].replace(/,/g, '')) || 0;
                    if (!isNaN(price)) {
                        map[id] = { name: name, price: price, change: change };
                    }
                });
                _twseAllCache = map;
                _twseAllCacheTime = Date.now();
                callback(null, map);
            } else {
                callback('TWSE 無資料');
            }
        })
        .catch(function(err) { callback(err.message || '網路錯誤'); });
}

// 個股查詢（備用，用於 STOCK_DAY_ALL 找不到的股票）
function fetchStockDaySingle(stockId, callback) {
    var today = new Date();
    var dateStr = today.getFullYear() +
        String(today.getMonth()+1).padStart(2,'0') +
        String(today.getDate()).padStart(2,'0');
    var url = 'https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=' + dateStr + '&stockNo=' + stockId;
    fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(json) {
            if (json.stat === 'OK' && json.data && json.data.length > 0) {
                var lastRow = json.data[json.data.length - 1];
                var price = parseFloat(lastRow[6].replace(/,/g, ''));
                var change = parseFloat(lastRow[7].replace(/,/g, '')) || 0;
                var name = '';
                if (json.title) {
                    var m = json.title.match(/\d{4,}\s+(.+?)\s+各日/);
                    if (m) name = m[1].trim();
                }
                callback(null, price, name, change);
            } else {
                // TWSE 查不到，用 FinMind 補查（債券 ETF、上櫃等）
                fetchFinMind(stockId, callback);
            }
        })
        .catch(function(err) {
            fetchFinMind(stockId, callback);
        });
}

// ── TPEX API（上櫃 / 債券 ETF 批次查詢）──
var _tpexAllCache = null;
var _tpexAllCacheTime = 0;
function fetchTPEXAll(callback) {
    if (_tpexAllCache && (Date.now() - _tpexAllCacheTime < 3 * 60 * 1000)) {
        callback(null, _tpexAllCache);
        return;
    }
    // TPEX v1 OpenAPI：當日上櫃收盤行情
    fetch('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes')
        .then(function(r) { return r.json(); })
        .then(function(arr) {
            if (!Array.isArray(arr) || arr.length === 0) { callback('TPEX 無資料'); return; }
            var map = {};
            arr.forEach(function(row) {
                var id = String(row.SecuritiesCompanyCode || '').trim();
                if (!id) return;
                var name = String(row.CompanyName || '').trim();
                var price = parseFloat(String(row.Close || '').replace(/,/g, ''));
                // Change 欄可能含漲跌符號（▲▼+-），抽出數字
                var chgRaw = String(row.Change || '');
                var chgMatch = chgRaw.match(/-?\d+(\.\d+)?/);
                var change = chgMatch ? parseFloat(chgMatch[0]) : 0;
                if (/[▼-]/.test(chgRaw) && change > 0) change = -change;
                if (!isNaN(price)) map[id] = { name: name, price: price, change: change };
            });
            if (!Object.keys(map).length) { callback('TPEX 無資料'); return; }
            _tpexAllCache = map;
            _tpexAllCacheTime = Date.now();
            callback(null, map);
        })
        .catch(function(err) { callback(err.message || 'TPEX 網路錯誤'); });
}

// ── FinMind API（債券 ETF、上櫃股票備用）──
function fetchFinMind(stockId, callback) {
    var today = new Date();
    var startDate = today.getFullYear() + '-' +
        String(today.getMonth()+1).padStart(2,'0') + '-01';
    var url = 'https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=' + stockId + '&start_date=' + startDate;
    fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(json) {
            if (json.status === 200 && json.data && json.data.length > 0) {
                var last = json.data[json.data.length - 1];
                var price = last.close;
                var change = last.spread || 0;
                // 查名稱
                fetchFinMindName(stockId, function(name) {
                    callback(null, price, name || '', change);
                });
            } else {
                callback('無資料');
            }
        })
        .catch(function(err) { callback(err.message || '網路錯誤'); });
}

function fetchFinMindName(stockId, callback) {
    fetch('https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo&data_id=' + stockId)
        .then(function(r) { return r.json(); })
        .then(function(json) {
            if (json.status === 200 && json.data && json.data.length > 0) {
                callback(json.data[json.data.length - 1].stock_name || '');
            } else {
                callback('');
            }
        })
        .catch(function() { callback(''); });
}

function fetchAllPrices(onDone) {
    if (stockData.holdings.length === 0) { if (onDone) onDone(); return; }
    fallbackTWSE(stockData.holdings, onDone);
}

function fallbackTWSE(holdings, onDone) {
    function needsName(h) { return !h.name || h.name === h.id || h.name === '查詢中...'; }
    var now = function(){ return _toROCDateTime(new Date()); };
    var flags = getFinMindFlags();
    // 標記過 FinMind 的先分離出來
    var finmindOnly = holdings.filter(function(h){ return flags[h.id]; });
    var rest = holdings.filter(function(h){ return !flags[h.id]; });

    fetchTWSEAll(function(err, twseMap) {
        twseMap = twseMap || {};
        // 第 1 級：TWSE
        var needTPEX = [];
        rest.forEach(function(h){
            if (twseMap[h.id]) {
                stockData.prices[h.id] = { price: twseMap[h.id].price, change: twseMap[h.id].change || 0, date: now() };
                if (needsName(h)) h.name = twseMap[h.id].name;
            } else {
                needTPEX.push(h);
            }
        });

        // 第 2 級：TPEX
        fetchTPEXAll(function(tpxErr, tpxMap) {
            tpxMap = tpxMap || {};
            var needFinMind = finmindOnly.slice();
            needTPEX.forEach(function(h){
                if (tpxMap[h.id]) {
                    stockData.prices[h.id] = { price: tpxMap[h.id].price, change: tpxMap[h.id].change || 0, date: now() };
                    if (needsName(h)) h.name = tpxMap[h.id].name;
                } else {
                    setFinMindFlag(h.id); // 下次直接走 FinMind
                    needFinMind.push(h);
                }
            });

            if (needFinMind.length === 0) {
                stockData.lastUpdate = now();
                saveStockData();
                if (onDone) onDone();
                return;
            }

            // 第 3 級：FinMind 逐筆
            var pending = needFinMind.length;
            var errors = [];
            needFinMind.forEach(function(h) {
                fetchFinMind(h.id, function(fErr, price, name, change) {
                    if (!fErr && price) {
                        stockData.prices[h.id] = { price: price, change: change || 0, date: now() };
                        if (name && needsName(h)) h.name = name;
                    } else {
                        errors.push(h.id + ': ' + (fErr || '無資料'));
                    }
                    pending--;
                    if (pending <= 0) {
                        stockData.lastUpdate = now();
                        saveStockData();
                        if (onDone) onDone(errors.length > 0 ? errors : null);
                    }
                });
            });
        });
    });
}

// ── 查詢股票名稱（三層：TWSE → TPEX → FinMind）──
function lookupStockName(stockId, callback) {
    fetchTWSEAll(function(err, twseMap) {
        if (!err && twseMap && twseMap[stockId]) { callback(null, twseMap[stockId].name); return; }
        fetchTPEXAll(function(e2, tpxMap) {
            if (!e2 && tpxMap && tpxMap[stockId]) { callback(null, tpxMap[stockId].name); return; }
            fetchFinMindName(stockId, function(name) {
                if (name) callback(null, name);
                else callback('查無此股票');
            });
        });
    });
}

function bindHoldingDrag(listEl) {
    if (!listEl) return;
    var dragging = null, startY = 0, originalIdx = -1, placeholder = null;
    listEl.querySelectorAll('.hold-drag-handle').forEach(function(handle) {
        handle.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            var row = handle.closest('.hold-drag-row');
            if (!row) return;
            dragging = row;
            originalIdx = parseInt(row.dataset.idx, 10);
            startY = e.clientY;
            var rect = row.getBoundingClientRect();
            placeholder = document.createElement('div');
            placeholder.style.height = rect.height + 'px';
            placeholder.style.background = 'rgba(200,164,90,0.15)';
            placeholder.style.borderBottom = '1px solid var(--border)';
            row.parentNode.insertBefore(placeholder, row);
            row.style.position = 'fixed';
            row.style.left = rect.left + 'px';
            row.style.top = rect.top + 'px';
            row.style.width = rect.width + 'px';
            row.style.zIndex = '300';
            row.style.boxShadow = '0 8px 24px rgba(0,0,0,0.2)';
            row.style.opacity = '0.95';
            handle.setPointerCapture(e.pointerId);
        });
        handle.addEventListener('pointermove', function(e) {
            if (!dragging) return;
            var dy = e.clientY - startY;
            dragging.style.top = (parseFloat(dragging.style.top) + dy) + 'px';
            startY = e.clientY;
            var siblings = listEl.querySelectorAll('.hold-drag-row');
            var insertBefore = null;
            for (var i = 0; i < siblings.length; i++) {
                var s = siblings[i];
                if (s === dragging) continue;
                var r = s.getBoundingClientRect();
                if (e.clientY < r.top + r.height / 2) { insertBefore = s; break; }
            }
            if (insertBefore) listEl.insertBefore(placeholder, insertBefore);
            else listEl.appendChild(placeholder);
        });
        function endDrag() {
            if (!dragging) return;
            var allChildren = Array.prototype.slice.call(listEl.children);
            var placeholderIdx = allChildren.indexOf(placeholder);
            var draggingIdx = allChildren.indexOf(dragging);
            var newIdx = placeholderIdx;
            if (draggingIdx >= 0 && draggingIdx < placeholderIdx) newIdx--;
            dragging.style.position = '';
            dragging.style.left = '';
            dragging.style.top = '';
            dragging.style.width = '';
            dragging.style.zIndex = '';
            dragging.style.boxShadow = '';
            dragging.style.opacity = '';
            placeholder.parentNode.insertBefore(dragging, placeholder);
            placeholder.remove();
            placeholder = null;
            if (newIdx !== originalIdx && newIdx >= 0) {
                var item = stockData.holdings.splice(originalIdx, 1)[0];
                stockData.holdings.splice(newIdx, 0, item);
                saveStockData();
                renderStock();
                var ov = listEl.closest('.overlay');
                if (ov) { ov.remove(); manageHoldings(); }
            }
            dragging = null;
            originalIdx = -1;
        }
        handle.addEventListener('pointerup', endDrag);
        handle.addEventListener('pointercancel', endDrag);
    });
}

// ── 股利管理 ──

// 把西元日期 YYYY-MM-DD 轉成 {rocYear, month}（民國年 + 月）
function _parseDividendDate(dateStr) {
    if (!dateStr) return null;
    var m = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    var year = parseInt(m[1], 10);
    var month = parseInt(m[2], 10);
    if (isNaN(year) || isNaN(month)) return null;
    return { rocYear: String(year - 1911), month: month };
}

// 確保 DATA.passive[year][source][month] 結構存在；缺的都自動建
// 所有 income/expense/passive 都是 {年: {分類: {1..12: 數字}}} 的月結構
function _ensurePassiveSlot(rocYear, source) {
    var years = DATA.settings.years || [];
    if (years.indexOf(rocYear) < 0) {
        DATA.settings.years.push(rocYear);
        DATA.settings.years.sort();
        if (!DATA.income[rocYear]) DATA.income[rocYear] = {};
        if (!DATA.expense[rocYear]) DATA.expense[rocYear] = {};
        if (!DATA.passive[rocYear]) DATA.passive[rocYear] = {};
        (DATA.settings.incomeCategories || []).forEach(function(c){
            var name = typeof c === 'string' ? c : c.name;
            DATA.income[rocYear][name] = _ensureMonths(DATA.income[rocYear][name]);
        });
        (DATA.settings.expenseCategories || []).forEach(function(c){
            var name = typeof c === 'string' ? c : c.name;
            DATA.expense[rocYear][name] = _ensureMonths(DATA.expense[rocYear][name]);
        });
        (DATA.settings.passiveSources || []).forEach(function(s){
            var name = typeof s === 'string' ? s : s.name;
            DATA.passive[rocYear][name] = _ensureMonths(DATA.passive[rocYear][name]);
        });
    }
    var sources = (DATA.settings.passiveSources || []).map(function(s){ return typeof s === 'string' ? s : s.name; });
    if (sources.indexOf(source) < 0) {
        DATA.settings.passiveSources.push({ name: source, memo: '' });
        (DATA.settings.years || []).forEach(function(y){
            if (!DATA.passive[y]) DATA.passive[y] = {};
            DATA.passive[y][source] = _ensureMonths(DATA.passive[y][source]);
        });
    }
    if (!DATA.passive[rocYear]) DATA.passive[rocYear] = {};
    DATA.passive[rocYear][source] = _ensureMonths(DATA.passive[rocYear][source]);
}

// 將金額加到/減去被動收入的股利欄位
// delta 為正 = 累加；為負 = 扣除
// 回傳 true = 同步成功；false = 未同步（不存在日期 / 扣除會變負 / 金額無效）
function _applyDividendToPassive(dateStr, cash, delta) {
    if (!cash || cash <= 0) return false;
    var d = _parseDividendDate(dateStr);
    if (!d) return false;
    _ensurePassiveSlot(d.rocYear, '股利');
    var cur = DATA.passive[d.rocYear]['股利'][d.month] || 0;
    var next = cur + delta * cash;
    // ★ 扣除時若會變負，代表使用者已手動下調過該月股利數字
    // 直接扣會破壞使用者的手動調整，停止同步並警告
    if (next < 0) {
        console.warn('[_applyDividendToPassive] 扣除會使被動收入股利變負，已停止同步。' +
                     '民國 ' + d.rocYear + '/' + d.month + ' 當前:' + cur + '，欲扣除:' + cash);
        toast('<i class="ti ti-alert-triangle"></i> 被動收入股利已被手動調整，此次未同步反向扣除（避免數字錯亂）', true);
        return false;
    }
    DATA.passive[d.rocYear]['股利'][d.month] = next;
    saveData();
    return true;
}

// 將金額加到/減去「收入→股利」分類（月結構：加到發放月份）
// 此為舊版同步函式的月化重寫，與頂部版本相同
function _applyDividendToIncome(dateStr, cash, delta) {
    if (!cash || cash <= 0) return false;
    var d = _parseDividendDate(dateStr);
    if (!d) return false;
    var cats = DATA.settings.incomeCategories || [];
    var hasDiv = cats.some(function(c){ return (typeof c === 'string' ? c : c.name) === '股利'; });
    if (!hasDiv) {
        DATA.settings.incomeCategories.push('股利');
        (DATA.settings.years || []).forEach(function(y){
            if (!DATA.income[y]) DATA.income[y] = {};
            if (DATA.income[y]['股利'] === undefined) DATA.income[y]['股利'] = _emptyMonths();
        });
    }
    if (!DATA.income[d.rocYear]) DATA.income[d.rocYear] = {};
    DATA.income[d.rocYear]['股利'] = _ensureMonths(DATA.income[d.rocYear]['股利']);
    var cur = DATA.income[d.rocYear]['股利'][d.month] || 0;
    var next = cur + delta * cash;
    if (next < 0) {
        if (typeof toast === 'function') toast('<i class="ti ti-alert-triangle"></i> 收入股利已被手動調整，此次未同步反向扣除（避免數字錯亂）', true);
        return false;
    }
    DATA.income[d.rocYear]['股利'][d.month] = next;
    saveData();
    return true;
}

function addDividend() {
    var options = stockData.holdings.map(function(h) {
        return '<option value="' + esc(h.id) + '">' + esc(h.id + ' ' + h.name) + '</option>';
    }).join('');
    var ov = document.createElement('div');
    ov.className = 'overlay';
    ov.innerHTML = '<div class="modal"><h3>新增股利紀錄</h3>' +
        '<label style="font-size:12px;color:var(--muted)">股票</label>' +
        '<select id="div-stock">' + options + '</select>' +
        '<label style="font-size:12px;color:var(--muted)">發放日期</label>' +
        '<input type="text" id="div-date" placeholder="YYYY-MM-DD">' +
        '<label style="font-size:12px;color:var(--muted)">現金股利（元）</label>' +
        '<input type="number" id="div-cash" placeholder="0" step="0.01">' +
        '<label style="font-size:12px;color:var(--muted)">股票股利（股）</label>' +
        '<input type="number" id="div-stock-shares" placeholder="0" step="0.01">' +
        '<div class="modal-btns"><button onclick="this.closest(\'.overlay\').remove()">取消</button>' +
        '<button class="btn-primary" id="div-save">確定</button></div></div>';
    document.body.appendChild(ov);
    // 預設今天
    document.getElementById('div-date').value = new Date().toISOString().slice(0,10);
    bindDateInput(document.getElementById('div-date'));
    document.getElementById('div-save').onclick = function() {
        var stockId = document.getElementById('div-stock').value;
        var date = document.getElementById('div-date').value;
        var cash = parseFloat(document.getElementById('div-cash').value) || 0;
        var stockShares = parseFloat(document.getElementById('div-stock-shares').value) || 0;
        if (!stockId) { toast('請選擇股票', true); return; }
        if (!date) { toast('請選擇日期', true); return; }
        if (cash <= 0 && stockShares <= 0) { toast('請輸入股利金額', true); return; }
        var holding = stockData.holdings.find(function(h){ return h.id === stockId; });
        var newRecord = {
            stockId: stockId,
            stockName: holding ? holding.name : stockId,
            date: date,
            cash: cash,
            stockShares: stockShares
        };
        // 同步加到被動收入（只同步現金股利，股票股利不計入）
        var synced = _applyDividendToPassive(date, cash, +1);
        if (synced) newRecord._syncedToPassive = true;
        // 同步加到「收入→股利」分類
        var syncedInc = _applyDividendToIncome(date, cash, +1);
        if (syncedInc) newRecord._syncedToIncome = true;
        stockData.dividends.push(newRecord);
        stockData.dividends.sort(function(a,b){ return b.date.localeCompare(a.date); });
        saveStockData();
        ov.remove();
        renderStock();
        if (currentTab === 'passive') renderPassive();
        if (currentTab === 'income') renderIncomeExpense('income');
        if (synced) {
            var d = _parseDividendDate(date);
            toast('已新增股利，並同步至被動收入 ' + d.rocYear + '/' + d.month + ' 股利 +' + Math.round(cash).toLocaleString());
        } else {
            toast('已新增股利紀錄');
        }
    };
    // 已移除點空白關閉行為（避免誤觸）
}

function deleteDividend(idx) {
    showConfirm('確定刪除此筆股利紀錄？', function() {
        var rec = stockData.dividends[idx];
        var wasSynced = rec && rec._syncedToPassive && rec.cash > 0;
        var wasSyncedInc = rec && rec._syncedToIncome && rec.cash > 0;
        var reverted = false;
        // 只有有同步標記的才反向扣除被動收入，避免誤動使用者手動填的數字
        if (wasSynced) {
            reverted = _applyDividendToPassive(rec.date, rec.cash, -1);
        }
        if (wasSyncedInc) {
            _applyDividendToIncome(rec.date, rec.cash, -1);
        }
        stockData.dividends.splice(idx, 1);
        saveStockData();
        renderStock();
        if (currentTab === 'passive') renderPassive();
        if (currentTab === 'income') renderIncomeExpense('income');
        if (reverted) {
            var d = _parseDividendDate(rec.date);
            toast('已刪除股利，並從被動收入 ' + d.rocYear + '/' + d.month + ' 股利 -' + Math.round(rec.cash).toLocaleString());
        } else if (!wasSynced) {
            toast('已刪除股利紀錄');
        }
        // 若 wasSynced 但 reverted=false，代表 _applyDividendToPassive 已自行 toast 警告，不覆蓋
    });
}

// ── 除權息通知 ──
var _dividendAlerts = [];
var _dividendAlertChecked = false;

function getDividendAlertRange() {
    var raw = localStorage.getItem('dividendAlertRange');
    if (raw) {
        try {
            var o = JSON.parse(raw);
            var before = Math.max(0, Math.min(180, +o.before || 30));
            return { before: before };
        } catch (e) {}
    }
    return { before: 30 };
}

function setDividendAlertRange(before) {
    localStorage.setItem('dividendAlertRange', JSON.stringify({ before: before }));
    _dividendAlertChecked = false;
    checkDividendAlerts();
}

function checkDividendAlerts() {
    _dividendAlerts = [];
    _dividendCacheUpdatedAt = null;
    if (stockData.holdings.length === 0) {
        _dividendAlertChecked = true;
        return;
    }
    var pending = stockData.holdings.length;
    var today = new Date();
    today.setHours(0,0,0,0);
    var startDate = today.getFullYear() + '-01-01';
    var range = getDividendAlertRange();
    var seen = {}; // 去重：stockId + exDate
    var holdingIds = {};
    stockData.holdings.forEach(function(h) { holdingIds[h.id] = h; });

    function _nextEventDiff(a) {
        // 選兩個日期中最近未來的（diff>=0）；若都過了，選較晚（距今負值較小者）
        var ex = a.diff, pay = a.payDiff;
        var futureCandidates = [ex, pay].filter(function(v){ return v !== null && v >= 0; });
        if (futureCandidates.length) return Math.min.apply(null, futureCandidates);
        var pastCandidates = [ex, pay].filter(function(v){ return v !== null; });
        return Math.max.apply(null, pastCandidates);
    }
    function _sortByNextEvent(a, b) { return _nextEventDiff(a) - _nextEventDiff(b); }
    function _diffDays(dateStr) {
        var norm = String(dateStr || '').slice(0, 10);
        if (!norm) return null;
        var parts = norm.split('-');
        if (parts.length !== 3) return null;
        var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
        return Math.round((d - today) / 86400000);
    }
    function pushAlert(h, exDate, cash, stockDiv, payDate) {
        var exDateNorm = String(exDate || '').slice(0, 10);
        if (!exDateNorm) return;
        var key = h.id + '|' + exDateNorm;
        if (seen[key]) return;
        var exDiff = _diffDays(exDateNorm);
        if (exDiff === null) return;
        var payDateNorm = String(payDate || '').slice(0, 10);
        var payDiff = _diffDays(payDateNorm);
        // 顯示規則：除息日/配息日任一在未來 before 天內 → 顯示；兩者皆已過才消失
        var maxDiff = Math.max(exDiff, payDiff === null ? exDiff : payDiff);
        if (maxDiff < 0 || maxDiff > range.before) return;
        seen[key] = true;
        _dividendAlerts.push({
            stockId: h.id, stockName: h.name,
            exDate: exDateNorm, payDate: payDateNorm,
            cash: cash || 0, stockDiv: stockDiv || 0,
            diff: exDiff, payDiff: payDiff
        });
    }

    // 先抓 Apps Script 快取（含 TWSE + MoneyDJ 合併資料）→ 一回來就先顯示
    var cachePromise = fetch(CLOUD_URL + '?action=dividends&format=json&t=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(cache) {
            if (cache && cache.updatedAt) _dividendCacheUpdatedAt = cache.updatedAt;
            if (cache && Array.isArray(cache.items)) {
                cache.items.forEach(function(d) {
                    var h = holdingIds[d.stockId];
                    if (!h) return;
                    pushAlert(h, d.exDate, d.cash, d.stockDiv, d.payDate);
                });
            }
            // 快取先行顯示，後續 FinMind 補完會再次 renderStock
            _dividendAlerts.sort(_sortByNextEvent);
            _dividendAlertChecked = true;
            renderStock();
        })
        .catch(function() {});

    cachePromise.then(function() {
        stockData.holdings.forEach(function(h) {
            var urlPreview = 'https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockDividend&data_id=' + h.id + '&start_date=' + startDate;
            var urlResult = 'https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockDividendResult&data_id=' + h.id + '&start_date=' + startDate;
            Promise.all([
                fetch(urlPreview).then(function(r){return r.json();}).catch(function(){return {data:[]};}),
                fetch(urlResult).then(function(r){return r.json();}).catch(function(){return {data:[]};})
            ])
                .then(function(results) {
                    var preview = results[0];
                    var result = results[1];
                    if (preview.status === 200 && preview.data) {
                        preview.data.forEach(function(d) {
                            var exDate = d.CashExDividendTradingDate || d.StockExDividendTradingDate || '';
                            if (!exDate) return;
                            pushAlert(h, exDate, d.CashEarningsDistribution, d.StockEarningsDistribution, d.CashDividendPaymentDate);
                        });
                    }
                    if (result.status === 200 && result.data) {
                        result.data.forEach(function(d) {
                            if (!d.date) return;
                            pushAlert(h, d.date, d.stock_and_cache_dividend, 0, '');
                        });
                    }
                    pending--;
                    if (pending <= 0) {
                        _dividendAlerts.sort(_sortByNextEvent);
                        _dividendAlertChecked = true;
                        renderStock();
                    }
                })
                .catch(function() {
                    pending--;
                    if (pending <= 0) { _dividendAlertChecked = true; renderStock(); }
                });
        });
    });
}

var _dividendCacheUpdatedAt = null;

function renderDividendAlerts() {
    var settingsBtn = '<button onclick="event.stopPropagation();openDividendAlertSettings()" title="提醒天數設定" style="background:none;border:none;cursor:pointer;color:var(--lux-navy);padding:0 4px;font-size:14px;"><i class="ti ti-settings"></i></button>';
    if (!_dividendAlertChecked) {

            '<span class="alert-summary" style="color:var(--text-light);font-size:12px;"><i class="ti ti-loader-2" style="animation:div-spin 1s linear infinite;display:inline-block;"></i> 載入中…</span>' +
            settingsBtn +
            '</div>';
    }
    var range = getDividendAlertRange();
    var count = _dividendAlerts.length;
    var summary;
    if (count === 0) {
        summary = '<span style="color:var(--text-light);font-size:12px;">未來 ' + range.before + ' 天內無除權息</span>';
    } else {

        var showDate, showLabel;

            showDate = first.exDate;
            showLabel = first.diff === 0 ? '（今天除息）' : '除息（' + first.diff + ' 天後）';
        } else if (first.payDiff !== null && first.payDiff >= 0) {
            showDate = first.payDate;
            showLabel = first.payDiff === 0 ? '（今天配息）' : '配息（' + first.payDiff + ' 天後）';
        } else {
            showDate = first.exDate;
            showLabel = '（已除息）';
        }
        summary = '<b>' + esc(first.stockId) + ' ' + esc(first.stockName) + '</b> ' + esc(showDate) + ' ' + showLabel;
        if (count > 1) summary += ' <span style="color:var(--text-light);">+' + (count-1) + ' 筆</span>';
    }
    var onclick = count > 0 ? ' onclick="showDividendAlertModal()"' : '';
    var cursor = count > 0 ? 'cursor:pointer;' : '';
    return '<div class="dividend-alert-compact"' + onclick + ' style="' + cursor + '">' +
        '<span class="alert-title-compact"><i class="ti ti-speakerphone"></i> 除權息</span>' +
        '<span class="alert-summary">' + summary + '</span>' +
        settingsBtn +
        '</div>';

function showDividendAlertModal() {
    if (_dividendAlerts.length === 0) return;
    var ov = document.createElement('div');
    ov.className = 'overlay';
    var html = '<div class="modal" style="width:720px;max-width:92vw;">';

        var payLabel = '';

    html += '</div>';
    ov.innerHTML = html;

function openDividendAlertSettings() {
    var range = getDividendAlertRange();
    var before = prompt('幾天內的除息/配息都提醒？（0-180）', range.before);
    if (before === null) return;
    var b = parseInt(before, 10);
    if (isNaN(b) || b < 0 || b > 180) { toast('請輸入 0-180 的整數'); return; }
    setDividendAlertRange(b);
    toast('已更新：' + b + ' 天內提醒');
}

//   月記錄 / 趨勢圖

// 上個月的民國年月字串，例如 "115/3"
function _lastMonthKey() {
    var now = new Date();
    var y = now.getFullYear();
    var lastMonthIdx = now.getMonth() - 1; // 0-11；-1 代表去年 12 月
    if (lastMonthIdx < 0) { lastMonthIdx = 11; y -= 1; }
    return (y - 1911) + '/' + (lastMonthIdx + 1);
}

// 把 "115/3" 轉成排序 key（字串比較時 "115/3" < "115/12"，所以要 pad）
function _monthSortKey(mk) {
    var parts = String(mk || '').split('/');
    if (parts.length !== 2) return '0000/00';
    var y = parts[0];
    var m = parts[1];
    if (m.length < 2) m = '0' + m;
    return y + '/' + m;
}

function _sortedMonthly() {
    var list = (DATA.monthly || []).slice();
    list.sort(function(a, b) {
        var ka = _monthSortKey(a.month);
        var kb = _monthSortKey(b.month);
        return ka < kb ? -1 : ka > kb ? 1 : 0;
    });
    return list;
}

var _trendChart = null;
var _trendRange = 12; // 近 N 個月；0 = 全部；-1 = 自訂
var _trendCustom = { start: null, end: null }; // 自訂範圍，民國年月字串
var _trendShow = { income: true, expense: true, balance: true };
var _trendYearOpen = {}; // 歷史表格年份展開狀態 { '115': true, '114': false }

function renderTrend() {
    var container = document.getElementById('tab-trend');
    if (!container) return;

    var all = _sortedMonthly();

    var html = '';

    // 頂端操作列
    html += '<div class="toolbar" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
    html += '<button class="btn-refresh" style="background:var(--lux-navy)" onclick="addMonthly()">＋ 新增</button>';
    html += '<span style="font-size:13px;color:var(--muted);margin-left:auto">範圍：</span>';
    var customLabel = '自訂';
    if (_trendRange === -1 && _trendCustom.start && _trendCustom.end) {
        customLabel = _trendCustom.start + ' ~ ' + _trendCustom.end;
    }
    [[12,'近 12 個月','12月'],[24,'近 24 個月','24月'],[0,'全部','全部'],[-1, customLabel, customLabel]].forEach(function(r) {
        var active = _trendRange === r[0];
        var onclick = r[0] === -1 ? 'onclick="openTrendCustomRange()"' : 'onclick="setTrendRange(' + r[0] + ')"';
        html += '<button class="trend-range-btn" ' + onclick + ' style="border:1px solid var(--border);border-radius:6px;background:' + (active?'var(--lux-navy)':'var(--card)') + ';color:' + (active?'white':'var(--text)') + ';cursor:pointer;font-family:inherit"><span class="lbl-full">' + esc(r[1]) + '</span><span class="lbl-short">' + esc(r[2]) + '</span></button>';
    });
    html += '</div>';

    if (all.length === 0) {
        html += '<div style="text-align:center;padding:40px;color:var(--muted)">尚未新增任何月記錄。<br>點上方「＋ 新增上個月」開始記錄。</div>';
        container.innerHTML = html;
        return;
    }

    // 折線圖 + 顯示切換
    html += '<div class="trend-chart-wrap" style="background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)">';
    html += '<div class="trend-toggle-row" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">';
    [
        ['income',  '收入', '#16A34A'],
        ['expense', '支出', '#DC2626'],
        ['balance', '結餘', '#0284C7']
    ].forEach(function(s) {
        var on = _trendShow[s[0]];
        html += '<button class="trend-toggle-btn" onclick="toggleTrendLine(\'' + s[0] + '\')" style="padding:6px 14px;border:2px solid ' + s[2] + ';border-radius:6px;background:' + (on ? s[2] : 'var(--card)') + ';color:' + (on ? 'white' : s[2]) + ';font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">' + s[1] + '</button>';
    });
    html += '</div>';
    html += '<canvas id="trend-chart" style="max-height:180px;display:block"></canvas>';
    html += '</div>';

    // 歷史表格：按年分組、可收合
    // 先按年分組
    var byYear = {};
    all.forEach(function(r) {
        var y = String(r.month).split('/')[0];
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push(r);
    });
    var years = Object.keys(byYear).sort(); // 字串排序，113 < 114 < 115
    var latestYear = years[years.length - 1];

    // 初始化展開狀態：預設只開最新年份
    years.forEach(function(y) {
        if (_trendYearOpen[y] === undefined) {
            _trendYearOpen[y] = (y === latestYear);
        }
    });

    // 年份倒序顯示（最新在上）
    var yearsDesc = years.slice().reverse();
    yearsDesc.forEach(function(y) {
        var rows = byYear[y];
        var yIncome = 0, yExpense = 0;
        rows.forEach(function(r) { yIncome += (r.income || 0); yExpense += (r.expense || 0); });
        var yBalance = yIncome - yExpense;
        var yBalColor = yBalance >= 0 ? 'var(--green)' : 'var(--red)';
        var open = _trendYearOpen[y];
        var arrow = open ? '▼' : '▶';

        html += '<div class="trend-year-card" style="background:var(--card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden">';
        // 年份標題列
        html += '<div class="trend-year-head" onclick="toggleTrendYear(\'' + y + '\')" style="cursor:pointer;user-select:none;padding:12px 16px;background:' + (open ? '#F1EDE8' : 'var(--card)') + ';border-bottom:' + (open ? '1px solid var(--border)' : 'none') + '">';
        html += '<div class="trend-year-title" style="display:flex;align-items:center;gap:10px"><span style="font-size:15px;font-weight:700">' + arrow + ' ' + y + ' 年</span><span class="trend-year-count" style="font-size:12px;color:var(--muted)">' + rows.length + ' 筆</span></div>';
        html += '<div class="trend-year-summary" style="display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;font-size:13px">';
        html += '<span><span style="color:var(--muted)">收入 </span><b style="color:var(--green)">' + fmt(yIncome) + '</b></span>';
        html += '<span><span style="color:var(--muted)">支出 </span><b style="color:var(--red)">' + fmt(yExpense) + '</b></span>';
        html += '<span><span style="color:var(--muted)">結餘 </span><b style="color:' + yBalColor + '">' + (yBalance >= 0 ? '+' : '') + fmt(yBalance) + '</b></span>';
        html += '</div></div>';

        // 月份明細表
        if (open) {
            html += '<div class="table-wrap"><table class="stock-table" style="margin:0"><thead><tr>';
            html += '<th>月份</th><th>收入</th><th>支出</th><th>結餘</th><th></th>';
            html += '</tr></thead><tbody>';
            var rowsDesc = rows.slice().reverse();
            rowsDesc.forEach(function(r) {
                var balance = (r.income || 0) - (r.expense || 0);
                var balColor = balance >= 0 ? 'var(--green)' : 'var(--red)';
                html += '<tr>';
                html += '<td style="cursor:pointer;font-weight:600" onclick="editMonthly(\'' + esc(r.month) + '\')">' + esc(r.month) + '</td>';
                html += '<td style="color:var(--green);font-weight:600">' + fmt(r.income || 0) + '</td>';
                html += '<td style="color:var(--red);font-weight:600">' + fmt(r.expense || 0) + '</td>';
                html += '<td style="font-weight:700;color:' + balColor + '">' + (balance >= 0 ? '+' : '') + fmt(balance) + '</td>';
                html += '<td><button class="btn-del" title="刪除" onclick="deleteMonthly(\'' + esc(r.month) + '\')"><i class="ti ti-x" style="font-size:14px"></i></button></td>';
                html += '</tr>';
            });
            html += '</tbody></table></div>';
        }
        html += '</div>';
    });

    container.innerHTML = html;

    // 畫圖（要等 canvas 進 DOM 後）
    _drawTrendChart(all);
}

function setTrendRange(n) {
    _trendRange = n;
    renderTrend();
}

function openTrendCustomRange() {
    var all = _sortedMonthly();
    if (all.length === 0) { toast('目前沒有任何月記錄', true); return; }
    var defaultStart = _trendCustom.start || all[0].month;
    var defaultEnd = _trendCustom.end || all[all.length-1].month;
    var options = all.map(function(r) {
        return '<option value="' + esc(r.month) + '">' + esc(r.month) + '</option>';
    }).join('');
    var ov = document.createElement('div');
    ov.className = 'overlay';
    var html = '<div class="modal"><h3>自訂範圍</h3>';
    html += '<label style="font-size:12px;color:var(--muted)">起始月份</label>';
    html += '<select id="tc-start">' + options + '</select>';
    html += '<label style="font-size:12px;color:var(--muted)">結束月份</label>';
    html += '<select id="tc-end">' + options + '</select>';
    html += '<div class="modal-btns"><button onclick="this.closest(\'.overlay\').remove()">取消</button>' +
            '<button class="btn-primary" id="tc-save">套用</button></div></div>';
    ov.innerHTML = html;
    document.body.appendChild(ov);
    document.getElementById('tc-start').value = defaultStart;
    document.getElementById('tc-end').value = defaultEnd;
    document.getElementById('tc-save').onclick = function() {
        var s = document.getElementById('tc-start').value;
        var e = document.getElementById('tc-end').value;
        if (_monthSortKey(s) > _monthSortKey(e)) { toast('起始不可晚於結束', true); return; }
        _trendCustom.start = s;
        _trendCustom.end = e;
        _trendRange = -1;
        ov.remove();
        renderTrend();
    };
}

function toggleOverview(section) {
    _overviewOpen[section] = !_overviewOpen[section];
    render();
}

function toggleTrendYear(y) {
    _trendYearOpen[y] = !_trendYearOpen[y];
    renderTrend();
}

function toggleTrendLine(key) {
    _trendShow[key] = !_trendShow[key];
    // 至少要留一條，避免空圖
    if (!_trendShow.income && !_trendShow.expense && !_trendShow.balance) {
        _trendShow[key] = true;
        return;
    }
    renderTrend();
}

function _drawTrendChart(all) {
    var canvas = document.getElementById('trend-chart');
    if (!canvas || typeof Chart === 'undefined') return;

    // 根據 _trendRange 切片
    var data;
    if (_trendRange > 0) {
        data = all.slice(-_trendRange);
    } else if (_trendRange === -1 && _trendCustom.start && _trendCustom.end) {
        var s = _monthSortKey(_trendCustom.start);
        var e = _monthSortKey(_trendCustom.end);
        data = all.filter(function(r) {
            var k = _monthSortKey(r.month);
            return k >= s && k <= e;
        });
    } else {
        data = all;
    }

    var labels = data.map(function(r){ return r.month; });
    var incomes = data.map(function(r){ return r.income || 0; });
    var expenses = data.map(function(r){ return r.expense || 0; });
    var balances = data.map(function(r){ return (r.income || 0) - (r.expense || 0); });

    // 銷毀舊圖
    if (_trendChart) { _trendChart.destroy(); _trendChart = null; }

    _trendChart = new Chart(canvas, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: '收入',
                    data: incomes,
                    borderColor: '#16A34A',
                    backgroundColor: 'rgba(22,163,74,0.08)',
                    tension: 0.25,
                    fill: false,
                    hidden: !_trendShow.income
                },
                {
                    label: '支出',
                    data: expenses,
                    borderColor: '#DC2626',
                    backgroundColor: 'rgba(220,38,38,0.08)',
                    tension: 0.25,
                    fill: false,
                    hidden: !_trendShow.expense
                },
                {
                    label: '結餘',
                    data: balances,
                    borderColor: '#0284C7',
                    backgroundColor: 'rgba(2,132,199,0.08)',
                    tension: 0.25,
                    fill: false,
                    borderDash: [6, 4],
                    hidden: !_trendShow.balance
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            var v = ctx.parsed.y;
                            return ctx.dataset.label + '：' + (v >= 0 ? '' : '') + v.toLocaleString();
                        }
                    }
                }
            },
            scales: {
                y: {
                    ticks: {
                        callback: function(v) { return v.toLocaleString(); }
                    }
                }
            }
        }
    });
}

// 新增或編輯的共用表單
// forceCustom: true 時預設不帶「上個月」而讓使用者填
function _monthlyForm(existing, forceCustom) {
    var ov = document.createElement('div');
    ov.className = 'overlay';
    var defaultMonth = existing ? existing.month : (forceCustom ? '' : _lastMonthKey());
    var title = existing ? '編輯月記錄' : '新增月記錄';
    var html = '<div class="modal"><h3>' + title + '</h3>';
    html += '<label style="font-size:12px;color:var(--muted)">月份（民國年/月，例如 115/3）</label>';
    html += '<input type="text" id="mo-month" placeholder="115/3" value="' + esc(defaultMonth) + '"' + (existing ? ' readonly style="background:#f5f5f5"' : '') + '>';
    html += '<label style="font-size:12px;color:var(--muted)">當月收入</label>';
    html += '<input type="number" id="mo-income" placeholder="0" step="1" value="' + (existing ? existing.income : '') + '">';
    html += '<label style="font-size:12px;color:var(--muted)">當月支出</label>';
    html += '<input type="number" id="mo-expense" placeholder="0" step="1" value="' + (existing ? existing.expense : '') + '">';
    html += '<label style="font-size:12px;color:var(--muted)">備註（選填）</label>';
    html += '<input type="text" id="mo-note" placeholder="" value="' + esc(existing ? (existing.note || '') : '') + '">';
    html += '<div class="modal-btns"><button onclick="this.closest(\'.overlay\').remove()">取消</button>' +
            '<button class="btn-primary" id="mo-save">' + (existing ? '儲存' : '新增') + '</button></div></div>';
    ov.innerHTML = html;
    document.body.appendChild(ov);
    document.getElementById('mo-save').onclick = function() {
        var month = document.getElementById('mo-month').value.trim();
        var income = parseInt(document.getElementById('mo-income').value) || 0;
        var expense = parseInt(document.getElementById('mo-expense').value) || 0;
        var note = document.getElementById('mo-note').value.trim();
        if (!/^\d{2,3}\/([1-9]|1[0-2])$/.test(month)) { toast('月份格式錯誤（例：115/3）', true); return; }
        if (income < 0 || expense < 0) { toast('金額不可為負', true); return; }
        if (!DATA.monthly) DATA.monthly = [];
        // 新增時檢查重複
        if (!existing) {
            var dup = DATA.monthly.find(function(r){ return r.month === month; });
            if (dup) { toast('該月份已存在，請改為編輯', true); return; }
            DATA.monthly.push({ month: month, income: income, expense: expense, note: note });
        } else {
            existing.income = income;
            existing.expense = expense;
            existing.note = note;
        }
        saveData();
        ov.remove();
        renderTrend();
        toast(existing ? '已更新 ' + month : '已新增 ' + month);
    };
}

function addMonthly(forceCustom) { _monthlyForm(null, forceCustom === true); }

function editMonthly(month) {
    var r = (DATA.monthly || []).find(function(x){ return x.month === month; });
    if (!r) return;
    _monthlyForm(r, false);
}

function deleteMonthly(month) {
    showConfirm('確定刪除 ' + month + ' 的月記錄？', function() {
        DATA.monthly = (DATA.monthly || []).filter(function(x){ return x.month !== month; });
        saveData();
        renderTrend();
        toast('已刪除 ' + month);
    });
}

function renderStock() {
    var container = document.getElementById('tab-stock');
    if (!container) return;

    var html = '';

    // 子頁籤 + 除權息提醒（並排）
    html += '<div class="stock-sub-tabs-row">';
    html += '<div class="stock-sub-tabs">';
    html += '<button class="stock-sub-tab' + (stockSubTab==='holdings'?' active':'') + '" onclick="stockSubTab=\'holdings\';renderStock()"><span class="lbl-full">持股總覽</span><span class="lbl-short">總覽</span></button>';
    html += '<button class="stock-sub-tab' + (stockSubTab==='dividend'?' active':'') + '" onclick="stockSubTab=\'dividend\';renderStock()"><span class="lbl-full">股利紀錄</span><span class="lbl-short">股利</span></button>';
    html += '<button class="stock-sub-tab' + (stockSubTab==='pledge'?' active':'') + '" onclick="stockSubTab=\'pledge\';renderStock()"><span class="lbl-full">質押紀錄</span><span class="lbl-short">質押</span></button>';
    html += '</div>';
    html += renderDividendAlerts();
    html += '</div>';

    if (stockSubTab === 'holdings') {
        html += renderStockHoldings();
    } else if (stockSubTab === 'dividend') {
        html += renderStockDividend();
    } else if (stockSubTab === 'pledge') {
        html += renderStockPledge();
    }

    container.innerHTML = html;
}

function renderStockHoldings() {
    var html = '';

    // 更新按鈕列
    html += '<div class="stock-refresh-bar">';
    html += '<button class="btn-refresh" id="btn-fetch-price" onclick="refreshPrices()"><i class="ti ti-antenna-bars-5"></i> <span class="lbl-full">更新股價</span><span class="lbl-short">更新</span></button>';
    html += '<button class="btn-refresh" style="background:linear-gradient(135deg,#0f2847 0%,#1a3a5c 50%,#2a5a8c 100%);border:1px solid var(--lux-gold)" onclick="toggleStockColumn()"><i class="ti ti-columns"></i> 欄位</button>';
    html += '<button class="btn-refresh" onclick="manageHoldings()"><i class="ti ti-list-details"></i> <span class="lbl-full">管理持股</span><span class="lbl-short">管理</span></button>';
    html += '<span class="last-update" style="color:var(--yellow)"><span class="lbl-full">※ 顯示前一交易日收盤價</span><span class="lbl-short">※ 顯示昨日收盤價</span></span>';
    html += '</div>';

    // 計算總覽
    var totalCost = 0, totalMarket = 0, todayPL = 0;
    stockData.holdings.forEach(function(h) {
        var cost = h.shares * h.cost;
        var p = stockData.prices[h.id];
        var market = p ? h.shares * p.price : cost;
        totalCost += cost;
        totalMarket += market;
        if (p && typeof p.change === 'number') todayPL += h.shares * p.change;
    });
    var totalPL = totalMarket - totalCost;
    var totalRate = totalCost > 0 ? (totalPL / totalCost) * 100 : 0;

    // 今年度股利
    var thisYear = new Date().getFullYear();
    var yearDividend = 0;
    stockData.dividends.forEach(function(d) {
        if (d.date && d.date.substring(0,4) === String(thisYear)) {
            yearDividend += (d.cash || 0);
        }
    });

    // 摘要列
    html += '<div class="stock-summary-bar" style="display:flex;flex-wrap:wrap;gap:6px 20px;font-size:14px;margin-bottom:10px;padding:8px 12px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)">';
    html += '<span style="color:var(--muted)">成本 <b style="color:var(--text)">' + fmt(totalCost) + '</b></span>';
    html += '<span style="color:var(--muted)"><span class="lbl-full">損益</span><span class="lbl-short">累積損益</span> <b class="' + (totalPL>=0?'pos':'neg') + '">' + (totalPL>=0?'+':'') + fmt(totalPL) + ' (' + fmtRate(totalRate) + ')</b></span>';
    html += '<span style="color:var(--muted)">市值 <b style="color:var(--lux-gold)">' + fmt(totalMarket) + '</b></span>';
    html += '<span style="color:var(--muted)">今日損益 <b class="' + (todayPL>=0?'pos':'neg') + '">' + (todayPL>=0?'+':'') + fmt(todayPL) + '</b></span>';
    html += '<span class="year-dividend-cell" style="color:var(--muted)">今年股利 <b style="color:var(--lux-navy)">' + fmt(yearDividend) + '</b></span>';
    html += '</div>';

    // 持股明細表
    if (stockData.holdings.length === 0) {
        html += '<div style="text-align:center;padding:40px;color:var(--muted)">尚未新增持股，請點擊「＋ 新增持股」開始</div>';
        return html;
    }

    var vis = getStockColVisible();

    // 排序狀態
    if (!window._stockSort) window._stockSort = { col: null, dir: 'desc' };
    var ss = window._stockSort;
    function _sArr(col) {
        if (ss.col !== col) return ' <span style="color:#bbb;font-size:11px">⇅</span>';
        return ' <span style="color:var(--lux-gold);font-size:11px">' + (ss.dir === 'desc' ? '▼' : '▲') + '</span>';
    }

    // 每列預先計算
    var rows = stockData.holdings.map(function(h, idx) {
        var p = stockData.prices[h.id];
        var curPrice = p ? p.price : null;
        var change = (p && typeof p.change === 'number') ? p.change : null;
        var changePct = (change !== null && curPrice !== null && curPrice - change !== 0) ? (change / (curPrice - change)) * 100 : null;
        var cost = h.shares * h.cost;
        var market = curPrice ? h.shares * curPrice : null;
        var pl = market !== null ? market - cost : null;
        var rate = (pl !== null && cost > 0) ? (pl / cost) * 100 : null;
        var weight = totalMarket > 0 && market !== null ? (market / totalMarket) * 100 : null;
        var dayPL = change !== null ? h.shares * change : null;
        var pledgedShares = 0;
        if (stockData.pledges) stockData.pledges.forEach(function(pp){ if (pp.stockId === h.id) pledgedShares += pp.shares; });
        return { h:h, idx:idx, curPrice:curPrice, change:change, changePct:changePct, cost:cost, market:market, pl:pl, rate:rate, weight:weight, dayPL:dayPL, pledgedShares:pledgedShares };
    });

    // 排序
    if (ss.col) {
        var dir = ss.dir === 'desc' ? -1 : 1;
        var nullLow = -Infinity;
        rows.sort(function(a, b) {
            var va, vb;
            switch (ss.col) {
                case 'name':    return (a.h.id || '').localeCompare(b.h.id || '') * dir;
                case 'dayPL':   va = a.dayPL !== null ? a.dayPL : nullLow; vb = b.dayPL !== null ? b.dayPL : nullLow; break;
                case 'price':   va = a.curPrice !== null ? a.curPrice : nullLow; vb = b.curPrice !== null ? b.curPrice : nullLow; break;
                case 'pl':      va = a.pl !== null ? a.pl : nullLow; vb = b.pl !== null ? b.pl : nullLow; break;
                case 'shares':  va = a.h.shares || 0; vb = b.h.shares || 0; break;
                case 'cost':    va = a.h.cost || 0; vb = b.h.cost || 0; break;
                case 'market':  va = a.market !== null ? a.market : nullLow; vb = b.market !== null ? b.market : nullLow; break;
                default: return 0;
            }
            return (va - vb) * dir;
        });
    }

    html += '<div class="table-wrap"><table class="stock-table holdings-table"><thead><tr>';
    html += '<th class="col-holdings-name" style="cursor:pointer;user-select:none" onclick="toggleStockSort(\'name\')">庫存股' + _sArr('name') + '</th>';
    if (vis.dayPL !== false) html += '<th class="col-daypl" style="cursor:pointer;user-select:none" onclick="toggleStockSort(\'dayPL\')">今日損益' + _sArr('dayPL') + '</th>';
    if (vis.price !== false) html += '<th class="col-price" style="cursor:pointer;user-select:none" onclick="toggleStockSort(\'price\')"><span class="col-title">股價</span><br><span class="stock-sub-label" style="font-size:11px;color:var(--muted);font-weight:400">漲跌幅</span>' + _sArr('price') + '</th>';
    if (vis.pl !== false) html += '<th class="col-pl" style="cursor:pointer;user-select:none" onclick="toggleStockSort(\'pl\')">總損益<br><span class="stock-sub-label" style="font-size:11px;color:var(--muted);font-weight:400">報酬率</span>' + _sArr('pl') + '</th>';
    if (vis.shares !== false) html += '<th class="col-shares" style="cursor:pointer;user-select:none" onclick="toggleStockSort(\'shares\')"><span class="col-title">股數</span>' + _sArr('shares') + '</th>';
    if (vis.cost !== false) html += '<th class="col-cost" style="cursor:pointer;user-select:none" onclick="toggleStockSort(\'cost\')"><span class="col-title">均價</span><br><span class="stock-sub-label" style="font-size:11px;color:var(--muted);font-weight:400">總成本</span>' + _sArr('cost') + '</th>';
    if (vis.market !== false) html += '<th class="col-market" style="cursor:pointer;user-select:none" onclick="toggleStockSort(\'market\')"><span class="col-title">市值</span><br><span class="stock-sub-label" style="font-size:11px;color:var(--muted);font-weight:400">佔比</span>' + _sArr('market') + '</th>';
    html += '</tr></thead><tbody>';

    rows.forEach(function(r) {
        var h = r.h;
        html += '<tr>';
        // 庫存股
        html += '<td class="stock-name-cell" style="cursor:pointer" onclick="editHolding(' + r.idx + ')">' + esc(h.id) + '<br><span class="stock-name-sub" style="font-size:12px;color:var(--muted);font-weight:400">' + esc(h.name) + '</span></td>';
        // 今日損益
        if (vis.dayPL !== false) {
            html += '<td class="col-daypl ' + (r.dayPL !== null ? (r.dayPL >= 0 ? 'pos' : 'neg') : '') + '" style="font-weight:600">' + (r.dayPL !== null ? (r.dayPL >= 0 ? '+' : '') + fmt(r.dayPL) : '-') + '</td>';
        }
        // 股價 / 漲跌幅
        if (vis.price !== false) {
            var priceHtml = r.curPrice !== null ? r.curPrice.toFixed(2) : '<span style="color:var(--muted)">-</span>';
            var pctHtml = '';
            if (r.changePct !== null && !isNaN(r.changePct)) {
                var pctCls = r.changePct >= 0 ? 'pos' : 'neg';
                pctHtml = '<br><span class="stock-sub-val ' + pctCls + '" style="font-size:11px">' + (r.changePct >= 0 ? '+' : '') + r.changePct.toFixed(2) + '%</span>';
            }
            html += '<td style="font-weight:600">' + priceHtml + pctHtml + '</td>';
        }
        // 總損益 / 報酬率
        if (vis.pl !== false) {
            var plCls = r.pl !== null ? (r.pl >= 0 ? 'pos' : 'neg') : '';
            var plHtml = r.pl !== null ? (r.pl >= 0 ? '+' : '') + fmt(r.pl) : '-';
            var rateHtml = '';
            if (r.rate !== null) {
                rateHtml = '<br><span class="stock-sub-val ' + plCls + '" style="font-size:11px;font-weight:400">' + (r.rate >= 0 ? '+' : '') + r.rate.toFixed(2) + '%</span>';
            }
            html += '<td class="' + plCls + '" style="font-weight:600">' + plHtml + rateHtml + '</td>';
        }
        // 股數 / 質押
        if (vis.shares !== false) {
            var pledgeHtml = r.pledgedShares > 0 ? '<br><span style="font-size:11px;color:#D97706;font-weight:500">質押 ' + fmt(r.pledgedShares) + '</span>' : '';
            html += '<td>' + fmt(h.shares) + pledgeHtml + '</td>';
        }
        // 均價 / 總成本
        if (vis.cost !== false) {
            html += '<td>' + h.cost.toFixed(2) + '<br><span class="stock-sub-val" style="font-size:11px;color:var(--muted);font-weight:400">' + fmt(r.cost) + '</span></td>';
        }
        // 市值 / 佔比
        if (vis.market !== false) {
            var marketHtml = r.market !== null ? fmt(r.market) : '-';
            var weightHtml = r.weight !== null ? '<br><span class="stock-sub-val" style="font-size:11px;color:var(--muted);font-weight:400">' + r.weight.toFixed(1) + '%</span>' : '';
            html += '<td style="font-weight:600">' + marketHtml + weightHtml + '</td>';
        }
        html += '</tr>';
    });

    html += '</tbody></table></div>';

    return html;
}

function toggleStockSort(col) {
    if (!window._stockSort) window._stockSort = { col: null, dir: 'desc' };
    var ss = window._stockSort;
    if (ss.col === col) {
        ss.dir = ss.dir === 'desc' ? 'asc' : 'desc';
    } else {
        ss.col = col;
        ss.dir = 'desc';
    }
    renderStock();
}

function toggleDivYear(year) {
    if (!window._divExpanded) window._divExpanded = {};
    var currentYear = String(new Date().getFullYear());
    // 今年預設 true，點擊後變 false；其他年份預設 false，點擊變 true
    if (year === currentYear) {
        window._divExpanded[year] = !(window._divExpanded[year] !== false);
    } else {
        window._divExpanded[year] = !(window._divExpanded[year] === true);
    }
    renderStock();
}

function renderStockDividend() {
    var html = '';

    // 累積股利統計方塊（依持股動態產生）
    var totals = {};
    stockData.holdings.forEach(function(h) { totals[h.id] = { label: h.name || h.id, sum: 0 }; });
    stockData.dividends.forEach(function(d) {
        if (totals[d.stockId]) {
            totals[d.stockId].sum += (d.cash || 0);
        }
    });

    html += '<div class="div-summary-wrap" style="margin-bottom:12px">';
    html += '<div class="div-add-row">';
    html += '<button class="btn-refresh" style="background:var(--lux-navy)" onclick="addDividend()">＋ 新增股利</button>';
    html += '</div>';
    html += '<div class="div-cum-row" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    stockData.holdings.forEach(function(h) {
        var t = totals[h.id];
        if (t.sum <= 0) return;
        html += '<div style="padding:8px 14px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);font-size:13px">';
        html += '<div style="color:var(--muted);font-size:11px">' + esc(t.label) + '<span class="lbl-cum"> 累積股利</span></div>';
        html += '<div style="font-weight:700;color:var(--lux-navy);font-size:15px">$' + fmt(t.sum) + '</div>';
        html += '</div>';
    });
    html += '</div></div>';

    if (stockData.dividends.length === 0) {
        html += '<div style="text-align:center;padding:40px;color:var(--muted)">尚未新增股利紀錄</div>';
        return html;
    }

    // 按年份分組
    var byYear = {};
    stockData.dividends.forEach(function(d, idx) {
        var y = d.date ? d.date.substring(0,4) : '未知';
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push({ d: d, idx: idx });
    });

    var years = Object.keys(byYear).sort().reverse();
    var currentYear = String(new Date().getFullYear());
    if (!window._divExpanded) window._divExpanded = {};

    years.forEach(function(y) {
        var items = byYear[y];
        var yearTotal = 0;
        items.forEach(function(item) { yearTotal += (item.d.cash || 0); });
        // 今年預設展開，其他年份依記憶狀態（預設收合）
        var expanded = (y === currentYear) ? (window._divExpanded[y] !== false) : (window._divExpanded[y] === true);
        var arrow = expanded ? '▼' : '▶';

        html += '<div class="dividend-section">';
        html += '<h3 style="cursor:pointer;user-select:none" onclick="toggleDivYear(\'' + esc(y) + '\')">' + arrow + ' ' + (parseInt(y,10) ? (parseInt(y,10) - 1911) : y) + ' 年<span class="dividend-year-total">合計 $' + fmt(yearTotal) + '</span></h3>';
        if (expanded) {
            html += '<div class="table-wrap"><table class="stock-table dividend-table"><thead><tr>';
            html += '<th>日期</th><th>股票</th><th>現金股利</th><th>股票股利</th><th style="width:32px"></th>';
            html += '</tr></thead><tbody>';

            items.forEach(function(item) {
                var d = item.d;
                html += '<tr>';
                html += '<td style="text-align:left">' + esc(_toROCDate(d.date)) + '</td>';
                html += '<td style="text-align:left">' + esc(d.stockId) + ' <span class="div-stock-name">' + esc(d.stockName) + '</span></td>';
                html += '<td style="color:var(--green);font-weight:600">' + (d.cash > 0 ? '$' + fmt(d.cash) : '-') + '</td>';
                html += '<td>' + (d.stockShares > 0 ? d.stockShares + ' 股' : '-') + '</td>';
                html += '<td style="width:32px"><button class="btn-del" onclick="deleteDividend(' + item.idx + ')"><i class="ti ti-x" style="font-size:14px"></i></button></td>';
                html += '</tr>';
            });

            html += '</tbody></table></div>';
        }
        html += '</div>';
    });

    return html;
}

// 綁定日期輸入框：8 碼數字自動格式化為 YYYY-MM-DD
function bindDateInput(el) {
    if (!el) return;
    el.addEventListener('input', function() {
        var v = el.value.replace(/\D/g, '');
        if (v.length >= 8) {
            el.value = v.slice(0,4) + '-' + v.slice(4,6) + '-' + v.slice(6,8);
        } else if (v.length >= 6) {
            el.value = v.slice(0,4) + '-' + v.slice(4,6) + (v.length > 6 ? '-' + v.slice(6) : '');
        } else if (v.length >= 4) {
            el.value = v.slice(0,4) + (v.length > 4 ? '-' + v.slice(4) : '');
        }
    });
}

// 計算質押到期日（預設半年 = 6 個月後）
function calcPledgeDue(dateStr) {
    var d = new Date(dateStr);
    d.setMonth(d.getMonth() + 6);
    return d;
}

function renderStockPledge() {
    var html = '';

    html += '<div class="toolbar">';
    html += '<button class="btn-refresh btn-pledge-add" style="background:var(--lux-navy)" onclick="addPledge()">＋ 新增質押</button>';
    html += '</div>';

    if (!stockData.pledges || stockData.pledges.length === 0) {
        html += '<div style="text-align:center;padding:40px;color:var(--muted)">尚未新增質押紀錄</div>';
        return html;
    }

    // 摘要
    var totalAmount = 0, totalCollateral = 0, totalDailyInterest = 0;
    stockData.pledges.forEach(function(p) {
        totalAmount += p.amount;
        var pr = stockData.prices[p.stockId];
        var curPrice = pr ? pr.price : 0;
        totalCollateral += curPrice * p.shares;
        totalDailyInterest += (p.amount || 0) * ((p.rate || 0) / 100) / 365;
    });
    var totalRatio = totalAmount > 0 ? (totalCollateral / totalAmount) * 100 : 0;
    var totalMonthlyInterest = totalDailyInterest * 30;

    html += '<div class="stock-summary-bar pledge-summary-bar" style="display:flex;flex-wrap:wrap;gap:6px 20px;font-size:14px;margin-bottom:10px;padding:8px 12px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)">';
    html += '<span class="ps-total" style="color:var(--muted)">總借款 <b style="color:var(--red)">' + fmt(totalAmount) + '</b></span>';
    html += '<span class="ps-collateral" style="color:var(--muted)">擔保現值 <b style="color:var(--lux-gold)">' + fmt(Math.round(totalCollateral)) + '</b></span>';
    html += '<span class="ps-ratio" style="color:var(--muted)">維持率 <b style="color:' + (totalRatio >= 130 ? 'var(--green)' : 'var(--red)') + '">' + totalRatio.toFixed(1) + '%</b></span>';
    html += '<span class="ps-spacer" style="flex:1"></span>';
    html += '<span class="pledge-interest pledge-interest-daily ps-daily" style="color:var(--muted)">日息 <b style="color:var(--red)">' + fmt(Math.round(totalDailyInterest)) + '</b></span>';
    html += '<span class="pledge-interest ps-monthly" style="color:var(--muted)">月息 <b style="color:var(--red)">' + fmt(Math.round(totalMonthlyInterest)) + '</b></span>';
    html += '</div>';

    // 到期提醒橫幅（半年一期 = 180 天，到期前 30 天提醒）
    var today = new Date();
    var dueAlerts = [];
    stockData.pledges.forEach(function(p) {
        if (!p.date) return;
        if (!p.amount || p.amount <= 0) return;  // 無借款不提醒到期
        var due = calcPledgeDue(p.date);
        var daysLeft = Math.ceil((due - today) / 86400000);
        if (daysLeft <= 30) {
            dueAlerts.push({ p: p, dueStr: due.toISOString().slice(0,10), daysLeft: daysLeft });
        }
    });
    if (dueAlerts.length > 0) {
        html += '<div class="dividend-alert" style="background:#FEF2F2;border-color:#FCA5A5">';
        html += '<div class="alert-title" style="color:#DC2626"><i class="ti ti-alert-triangle"></i> 質押到期提醒</div>';
        dueAlerts.forEach(function(a) {
            var label = a.daysLeft < 0 ? '（已逾期 ' + Math.abs(a.daysLeft) + ' 天）'
                      : a.daysLeft === 0 ? '（今天到期）'
                      : '（' + a.daysLeft + ' 天後到期）';
            html += '<div class="alert-item">';
            html += '<b>' + esc(a.p.stockId) + ' ' + esc(a.p.stockName) + '</b> ';
            html += '借款 ' + fmt(a.p.amount) + '，到期日 <span class="alert-date" style="color:#DC2626">' + a.dueStr + '</span> ' + label;
            html += '</div>';
        });
        html += '</div>';
    }

    // 表格
    html += '<div class="table-wrap"><table class="stock-table pledge-table"><thead><tr>';
    html += '<th>標的</th><th>質押股數</th><th>借款金額</th><th>年利率</th><th>擔保現值</th><th>維持率</th><th>質押日</th><th>到期日</th><th></th>';
    html += '</tr></thead><tbody>';

    stockData.pledges.forEach(function(p, idx) {
        var pr = stockData.prices[p.stockId];
        var curPrice = pr ? pr.price : null;
        var collateral = curPrice ? curPrice * p.shares : null;
        var noDebt = (!p.amount || p.amount <= 0);
        var ratio = (collateral && p.amount > 0) ? (collateral / p.amount) * 100 : null;
        var ratioColor = noDebt ? 'var(--green)' : (ratio !== null ? (ratio >= 130 ? 'var(--green)' : 'var(--red)') : '');
        var dueStr = '-', dueColor = '', dueDaysLabel = '';
        if (p.date) {
            var due = calcPledgeDue(p.date);
            dueStr = due.toISOString().slice(0,10);
            var daysLeft = Math.ceil((due - today) / 86400000);
            if (daysLeft <= 30) {
                dueColor = 'color:#DC2626;font-weight:700';
                dueDaysLabel = '<br><span style="font-size:11px">' +
                    (daysLeft < 0 ? '逾期 ' + Math.abs(daysLeft) + ' 天' :
                     daysLeft === 0 ? '今天到期' : daysLeft + ' 天')  + '</span>';
            }
        }

        html += '<tr>';
        html += '<td class="stock-name-cell" style="cursor:pointer" onclick="editPledge(' + idx + ')">' + esc(p.stockId) + '<br><span class="pledge-stock-name" style="font-size:12px;color:var(--muted);font-weight:400">' + esc(p.stockName) + '</span></td>';
        html += '<td>' + fmt(p.shares) + '</td>';
        html += '<td style="color:var(--red);font-weight:600">' + fmt(p.amount) + '</td>';
        html += '<td>' + p.rate.toFixed(2) + '%</td>';
        html += '<td style="font-weight:600">' + (collateral ? fmt(Math.round(collateral)) : '-') + '</td>';
        html += '<td style="font-weight:700;color:' + ratioColor + '">' + (noDebt ? '∞' : (ratio ? ratio.toFixed(1) + '%' : '-')) + '</td>';
        html += '<td style="font-size:12px">' + esc(_toROCDate(p.date || '')) + '</td>';
        html += '<td style="font-size:12px;' + (noDebt ? '' : dueColor) + '">' + (noDebt ? '-' : _toROCDate(dueStr) + dueDaysLabel) + '</td>';
        html += '<td style="white-space:nowrap"><button class="btn-del" title="展延" onclick="renewPledge(' + idx + ')"><i class="ti ti-refresh"></i></button><button class="btn-del" title="刪除" onclick="deletePledge(' + idx + ')"><i class="ti ti-x" style="font-size:14px"></i></button></td>';
        html += '</tr>';
    });

    html += '</tbody></table></div>';
    return html;
}

// ══════════════════════════════════════════
//   淨資產
// ══════════════════════════════════════════

var ASSET_SECTIONS = [
    { key: 'liquid',     label: '流動資金', sign: +1 },
    { key: 'invest',     label: '投資',     sign: +1 },
    { key: 'fixed',      label: '固定資產', sign: +1 },
    { key: 'receivable', label: '應收款',   sign: +1 },
    { key: 'debt',       label: '負債',     sign: -1 }
];
var _assetTrendChart = null;
var _assetFxFetching = false;

function _assetUid() { return 'a_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7); }
function _todayStr() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function getFxRate(currency) {
    if (currency === 'TWD' || !currency) return 1;
    var r = DATA.assets.rates[currency];
    return (typeof r === 'number' && r > 0) ? r : 1;
}

function accountTWD(acc) {
    if (!acc) return 0;
    var amt = Number(acc.amount) || 0;
    if (acc.currency && acc.currency !== 'TWD') {
        var rate = (typeof acc.rate === 'number' && acc.rate > 0) ? acc.rate : getFxRate(acc.currency);
        return amt * rate;
    }
    return amt;
}

// 台股自動連動：持股市值總和
function calcStockHoldingsTWD() {
    if (!stockData || !Array.isArray(stockData.holdings)) return 0;
    var total = 0;
    stockData.holdings.forEach(function(h) {
        var p = stockData.prices && stockData.prices[h.id];
        var price = p ? p.price : (h.cost || 0);
        total += price * (h.shares || 0);
    });
    return total;
}
// 台股自動連動：質押借款總和
function calcStockPledgeDebtTWD() {
    if (!stockData || !Array.isArray(stockData.pledges)) return 0;
    return stockData.pledges.reduce(function(a, p){ return a + (Number(p.amount) || 0); }, 0);
}

function sectionTotal(key) {
    if (key === 'invest') {
        var manual = (DATA.assets.invest || []).reduce(function(a,x){ return a + accountTWD(x); }, 0);
        return manual + calcStockHoldingsTWD();
    }
    if (key === 'debt') {
        var manual2 = (DATA.assets.debt || []).reduce(function(a,x){ return a + accountTWD(x); }, 0);
        return manual2 + calcStockPledgeDebtTWD();
    }
    return (DATA.assets[key] || []).reduce(function(a,x){ return a + accountTWD(x); }, 0);
}

function calcNetWorth() {
    var total = 0;
    ASSET_SECTIONS.forEach(function(s) { total += s.sign * sectionTotal(s.key); });
    return Math.round(total);
}

function calcBreakdown() {
    var b = {};
    ASSET_SECTIONS.forEach(function(s) { b[s.key] = Math.round(sectionTotal(s.key)); });
    return b;
}

// ── 自動快照 ──
function maybeAutoSnapshot() {
    try {
        var today = _todayStr();
        if (!Array.isArray(DATA.assets.history)) DATA.assets.history = [];
        var hist = DATA.assets.history;
        var nw = calcNetWorth();
        var br = calcBreakdown();
        var last = hist[hist.length - 1];
        if (last && last.date === today) {
            last.netWorth = nw;
            last.breakdown = br;
        } else {
            hist.push({ date: today, netWorth: nw, breakdown: br });
            if (hist.length > 3000) hist.splice(0, hist.length - 3000);
        }
        saveData(true);
    } catch(e) { console.error('[maybeAutoSnapshot]', e); }
}

// ── 匯率自動抓（open.er-api.com） ──
function fetchFxRates(onDone) {
    if (_assetFxFetching) { if (onDone) onDone(false); return; }
    _assetFxFetching = true;
    var url = 'https://open.er-api.com/v6/latest/TWD';
    fetch(url).then(function(r){ return r.json(); }).then(function(data){
        _assetFxFetching = false;
        if (!data || data.result !== 'success' || !data.rates) {
            if (onDone) onDone(false);
            return;
        }
        // 回傳是 1 TWD = X foreign → 我們要 1 foreign = 1/X TWD
        var rates = DATA.assets.rates || {};
        ['USD','JPY','KRW'].forEach(function(c) {
            var v = data.rates[c];
            if (typeof v === 'number' && v > 0) rates[c] = 1 / v;
        });
        rates.updatedAt = _todayStr();
        DATA.assets.rates = rates;

// ── 黃金國際金價（api.gold-api.com） ──
// 回傳 USD/oz → 換算成 TWD/兩（1 台兩 = 1.20565 oz）
function fetchGoldPrice(onDone) {
    var url = 'https://api.gold-api.com/price/XAU';
    fetch(url).then(function(r){ return r.json(); }).then(function(data){
        // 預期 { price: USD_per_oz }
        var usdPerOz = data && (data.price || data.rate || data.usd);
        if (typeof usdPerOz !== 'number' || usdPerOz <= 0) { if (onDone) onDone(false); return; }
        var usdTwd = getFxRate('USD') || 31.7;
        var twdPerTael = usdPerOz * 1.20565 * usdTwd;
        DATA.assets.goldRef = { twdPerTael: Math.round(twdPerTael), updatedAt: _todayStr() };
        saveData(true);
        if (onDone) onDone(true);
    }).catch(function(err){
        console.warn('[fetchGoldPrice] failed', err);
        if (onDone) onDone(false);
    });
}

function maybeAutoFetchGold() {
    var g = DATA.assets.goldRef || {};
    if (g.updatedAt === _todayStr()) return;
    fetchGoldPrice(function(ok){

function setSectionTrendRange(key, months) {
    _sectionTrendState[key] = months;
    _drawSectionTrendChart(key);

function _drawSectionTrendChart(key) {
    var hist = DATA.assets.history || [];
    var months = _sectionTrendState[key] || 6;
    var filtered = hist;
    if (months > 0) {
        var cutoff = new Date();
        cutoff.setMonth(cutoff.getMonth() - months);
        var cutoffStr = cutoff.getFullYear() + '-' + String(cutoff.getMonth()+1).padStart(2,'0') + '-' + String(cutoff.getDate()).padStart(2,'0');
        filtered = hist.filter(function(h){ return h.date >= cutoffStr; });
    }
    // 按鈕 active
    var ov = document.querySelector('.section-trend-overlay');
    if (ov) {
        ov.querySelectorAll('.nw-range-btn').forEach(function(b){
            var m = b.textContent.trim().match(/\d+/);
            var val = m ? parseInt(m[0]) : 0;
            b.classList.toggle('active', val === months);
        });
    }
    var canvas = document.getElementById('section-trend-chart');
    if (!canvas) return;
    if (_sectionTrendChart) { try { _sectionTrendChart.destroy(); } catch(_){} }
    if (filtered.length < 1) {
        var ctx0 = canvas.getContext('2d');
        ctx0.clearRect(0,0,canvas.width,canvas.height);
        ctx0.fillStyle = '#8C8578';
        ctx0.font = '13px sans-serif';
        ctx0.textAlign = 'center';
        ctx0.fillText('此範圍內無資料', canvas.width/2, 40);
        return;
    }
    var labels = filtered.map(function(h){ return _toROCDate(h.date); });
    var values = filtered.map(function(h){ return (h.breakdown && h.breakdown[key]) || 0; });
    var isDebt = key === 'debt';
    var color = isDebt ? '#DC2626' : '#059669';
    _sectionTrendChart = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{ data: values, borderColor: color, backgroundColor: color + '1A', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: color, borderWidth: 2 }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            animation: false,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: function(ctx){ return fmt(ctx.parsed.y); } } }
            },
            scales: {
                y: { ticks: { callback: function(v){ return fmt(v); } } }
            }
        }
    });
}
